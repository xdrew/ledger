# Test overrides (loaded after services.yaml). Record metrics in memory — the
# RoadRunner metrics RPC is unavailable in tests — and expose the recorder so
# functional tests can assert business counters.
services:
    App\Observability\Metrics\InMemoryMetrics:
        public: true

    App\Observability\Metrics\Metrics: '@App\Observability\Metrics\InMemoryMetrics'

    # NL statement queries: deterministic fake — CI never calls the Anthropic API.
    App\Tests\Support\FakeStatementQueryTranslator: ~

    App\Infrastructure\NlQuery\StatementQueryTranslator: '@App\Tests\Support\FakeStatementQueryTranslator'

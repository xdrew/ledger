services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        App\EventStore\Serialization\EventTypeProvider:
            tags: ['app.event_type_provider']
        App\Projections\Projector:
            tags: ['app.projector']

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            # Value objects / events / exceptions — data, not services.
            - '../src/SharedKernel/Event/DomainEvent.php'
            - '../src/SharedKernel/Event/EventId.php'
            - '../src/SharedKernel/Money/'
            - '../src/EventStore/StreamId.php'
            - '../src/EventStore/RecordedEvent.php'
            - '../src/EventStore/EventMetadata.php'
            - '../src/EventStore/ConcurrencyConflict.php'
            - '../src/EventStore/EventStore.php'
            - '../src/EventStore/Serialization/SerializedEvent.php'
            - '../src/EventStore/Serialization/UnknownEventType.php'
            - '../src/EventStore/Aggregate/'
            - '../src/Accounts/Domain/'
            - '../src/Ledger/Domain/'
            - '../src/Transfers/Domain/'
            - '../src/Transfers/Application/InitiateTransfer.php'
            - '../src/Transfers/Application/ReverseTransfer.php'
            - '../src/Idempotency/IdempotencyKey.php'
            - '../src/Idempotency/StoredResponse.php'
            - '../src/Idempotency/Ttl.php'
            - '../src/Idempotency/IdempotencyStore.php'
            - '../src/Idempotency/Outcome/'
            - '../src/Projections/Projector.php'
            - '../src/Projections/Query/AccountBalance.php'
            - '../src/Projections/Query/StatementEntry.php'

    # Ports -> default adapters.
    App\SharedKernel\Clock\Clock: '@App\SharedKernel\Clock\SystemClock'
    App\EventStore\EventStore: '@App\EventStore\Dbal\DbalEventStore'
    App\Accounts\Domain\AccountRepository: '@App\Accounts\Infrastructure\EventSourcedAccountRepository'
    App\Ledger\Domain\LedgerRepository: '@App\Ledger\Infrastructure\EventSourcedLedgerRepository'
    App\Ledger\Domain\AccountStatusReader: '@App\Ledger\Infrastructure\AccountRepositoryStatusReader'
    App\Transfers\Domain\TransferRepository: '@App\Transfers\Infrastructure\EventSourcedTransferRepository'
    App\Idempotency\IdempotencyStore: '@App\Idempotency\Dbal\DbalIdempotencyStore'

    # Idempotency TTL from the environment (seconds).
    App\Idempotency\Ttl:
        factory: ['App\Idempotency\Ttl', 'ofSeconds']
        arguments: ['%env(int:IDEMPOTENCY_TTL_SECONDS)%']

    # Ledger posting service lives in the domain but is a wired service.
    App\Ledger\Domain\JournalPostingService:
        autowire: true

    # Each bounded context contributes its event types via a tagged provider;
    # the configurator applies them all to the shared registry.
    App\EventStore\Serialization\EventTypeRegistryConfigurator:
        arguments:
            $providers: !tagged_iterator app.event_type_provider

    App\EventStore\Serialization\EventTypeRegistry:
        configurator: ['@App\EventStore\Serialization\EventTypeRegistryConfigurator', 'configure']

    # Projection runner receives every tagged projector.
    App\Projections\ProjectionRunner:
        arguments:
            $projectors: !tagged_iterator app.projector

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

scrape_configs:
  - job_name: ledger-api
    static_configs:
      - targets: ["api:2112"]
        labels: { role: api }

  - job_name: ledger-worker
    static_configs:
      - targets: ["worker:2112"]
        labels: { role: worker }

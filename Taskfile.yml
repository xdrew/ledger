version: '3'

vars:
  COMPOSE: docker compose
  APP: docker compose exec -T app

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  up:
    desc: Start the stack (PostgreSQL + app container)
    cmds:
      - "{{.COMPOSE}} up -d --build"

  down:
    desc: Stop the stack and remove volumes
    cmds:
      - "{{.COMPOSE}} down -v"

  build:
    desc: Rebuild the app image
    cmds:
      - "{{.COMPOSE}} build"

  install:
    desc: Install Composer dependencies (incl. vendor-bin tools)
    cmds:
      - "{{.APP}} composer install"

  tools:
    desc: Install/update the isolated vendor-bin tools (phpstan, php-cs-fixer, phpunit)
    cmds:
      - "{{.APP}} composer bin all install"

  outdated:
    desc: Show outdated direct dependencies (root + isolated tools)
    cmds:
      - "{{.APP}} composer outdated --direct"
      - "{{.APP}} composer bin tools outdated --direct"

  console:
    desc: Run the Symfony console (pass args after --, e.g. `task console -- debug:container`)
    cmds:
      - "{{.APP}} php bin/console {{.CLI_ARGS}}"

  db-ping:
    desc: Verify database connectivity
    cmds:
      - "{{.APP}} php bin/console app:db:ping"

  migrate:
    desc: Apply pending migrations
    cmds:
      - "{{.APP}} php bin/console doctrine:migrations:migrate --no-interaction"

  rollback:
    desc: Roll back the last migration
    cmds:
      - "{{.APP}} php bin/console doctrine:migrations:migrate prev --no-interaction"

  lint:
    desc: Check code style
    cmds:
      - "{{.APP}} vendor/bin/php-cs-fixer fix --dry-run --diff"

  lint:fix:
    desc: Fix code style
    cmds:
      - "{{.APP}} vendor/bin/php-cs-fixer fix"

  analyse:
    desc: Run PHPStan at max level
    cmds:
      - "{{.APP}} vendor/bin/phpstan analyse --memory-limit=512M"

  rector:
    desc: Preview automated refactorings (dry-run, no changes written)
    cmds:
      - "{{.APP}} vendor/bin/rector process --dry-run"

  rector:fix:
    desc: Apply automated refactorings
    cmds:
      - "{{.APP}} vendor/bin/rector process"

  infection:
    desc: Mutation testing on the domain layer (blocking MSI floor)
    cmds:
      - "{{.APP}} vendor/bin/infection --min-msi=95 --no-progress"

  test:unit:
    desc: Run the unit suite
    cmds:
      - "{{.APP}} vendor/bin/phpunit --testsuite unit"

  test:integration:
    desc: Run the integration suite
    cmds:
      - "{{.APP}} vendor/bin/phpunit --testsuite integration"

  test:functional:
    desc: Run the HTTP API (functional) suite
    cmds:
      - "{{.APP}} vendor/bin/phpunit --testsuite functional"

  test:
    desc: Run all tests (unit + integration + functional)
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:functional

  up:stack:
    desc: Bring up the full deployment stack (api, worker, postgres, prometheus, grafana, otel) migrated + seeded
    cmds:
      - "{{.COMPOSE}} up -d --build migrate seed api worker prometheus grafana otel-collector"

  serve:
    desc: Serve the HTTP API via RoadRunner (http://localhost:8080)
    cmds:
      - "{{.COMPOSE}} up -d --build api"

  smoke:
    desc: Smoke-test the running RoadRunner server (GET /healthz)
    cmds:
      - "{{.COMPOSE}} up -d --build api"
      - 'until curl -fsS http://localhost:${HTTP_HOST_PORT:-8080}/healthz >/dev/null 2>&1; do sleep 1; done'
      - 'curl -fsS http://localhost:${HTTP_HOST_PORT:-8080}/healthz && echo'

  spec:
    desc: Validate all OpenSpec changes strictly
    cmds:
      - openspec validate --all --strict

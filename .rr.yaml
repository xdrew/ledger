version: "3"

server:
  command: "php public/index.php"
  env:
    - APP_RUNTIME: Baldinof\RoadRunnerBundle\Runtime\Runtime

http:
  address: 0.0.0.0:8080
  pool:
    num_workers: 4
    max_jobs: 500
  middleware: ["gzip"]

logs:
  mode: production
  encoding: json

# RPC endpoint — required for the app to push metrics to the plugin (RR injects
# its address into workers/services as RR_RPC).
rpc:
  listen: tcp://127.0.0.1:6001

# Prometheus metrics endpoint (RR runtime metrics + the counters the API emits),
# on a separate port from serving traffic. DB-derived gauges are collected by the
# worker (see .rr-worker.yaml).
metrics:
  address: 0.0.0.0:2112

version: "3"

server:
  command: "php public/index.php"
  env:
    - APP_RUNTIME: Baldinof\RoadRunnerBundle\Runtime\Runtime

http:
  address: 0.0.0.0:8080
  pool:
    num_workers: 2
    max_jobs: 0
  middleware: ["gzip"]

logs:
  mode: development
  encoding: json
  channels:
    http:
      level: info
    server:
      level: info

# RPC endpoint — required for the app to push metrics to the plugin (RR injects
# its address into workers/services as RR_RPC).
rpc:
  listen: tcp://127.0.0.1:6001

# Prometheus metrics endpoint (RR runtime metrics + app business metrics via RPC),
# on a separate port from serving traffic.
metrics:
  address: 0.0.0.0:2112

# Refresh the DB-derived gauges on an interval so scrapes stay current.
service:
  metrics-collect:
    command: "php bin/console metrics:collect --loop --interval=10"
    process_num: 1
    remain_after_exit: true
    restart_sec: 5
